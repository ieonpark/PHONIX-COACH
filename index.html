// ─── SCORING ENGINE ──────────────────────────────────
function normW(w){return w.toLowerCase().replace(/[^a-z]/g,'');}
function lev(a,b){
  var m=a.length,n=b.length,dp=[];
  for(var i=0;i<=m;i++){dp[i]=[i];}
  for(var j=0;j<=n;j++){dp[0][j]=j;}
  for(var i=1;i<=m;i++)
    for(var j=1;j<=n;j++)
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function wMatch(said,tgt){
  if(said===tgt) return true;
  if(tgt.startsWith(said)||said.startsWith(tgt)) return true;
  return lev(said,tgt)<=(tgt.length<=4?1:2);
}

function analyze(transcript,targetSentence){
  if(!targetSentence||!targetSentence.trim()){
    var words=transcript.trim().split(/\s+/);
    var issues=[];
    words.forEach(function(w){
      var cl=normW(w);
      if(!cl||cl.length<3) return;
      if(TIPS[cl]&&issues.length<3)
        issues.push({word:cl,said:cl,issue:TIPS[cl].why,tip:TIPS[cl].tip});
    });
    var sc=Math.min(88,Math.max(50,78-issues.length*8));
    return {score:sc,issues:issues,wordDisplay:null,matched:0,total:0};
  }
  var said=transcript.trim().split(/\s+/).map(normW).filter(Boolean);
  var tgt=targetSentence.trim().split(/\s+/).map(normW).filter(Boolean);
  var results=[];
  var si=0;
  for(var ti=0;ti<tgt.length;ti++){
    var tw=tgt[ti];
    if(si<said.length&&wMatch(said[si],tw)){
      results.push({t:tw,s:said[si],ok:true});si++;
    } else if(si+1<said.length&&wMatch(said[si+1],tw)){
      results.push({t:tw,s:said[si+1],ok:true});si+=2;
    } else {
      results.push({t:tw,s:si<said.length?said[si]:null,ok:false});
      if(si<said.length) si++;
    }
  }
  var matched=results.filter(function(r){return r.ok;}).length;
  var total=tgt.length;
  var score=Math.min(97,Math.max(10,Math.round((matched/total)*100)));
  var issues=[];
  results.forEach(function(r){
    if(!r.ok&&issues.length<4){
      var tw=r.t;
      var kn=TIPS[tw];
      if(kn) issues.push({word:tw,said:r.s||"(빠짐)",issue:(r.s?'"'+r.s+'" 로 들렸어요 — ':'')+kn.why,tip:kn.tip});
      else if(r.s){
        var tip="";
        if(/^th/i.test(tw)) tip="혀를 이 사이에 살짝 대고 바람 (TH)";
        else if(/^r/i.test(tw)&&/^l/i.test(r.s||"")) tip="R: 혀를 어디에도 닿지 않게";
        else if(lev(tw,r.s||"")<=2) tip="거의 맞아요! 강세 위치를 확인해 보세요";
        else tip='"'+tw+'"를 천천히 발음해 보세요';
        issues.push({word:tw,said:r.s,issue:'"'+r.s+'" 로 들렸어요',tip:tip});
      } else {
        issues.push({word:tw,said:"(빠짐)",issue:"이 단어가 들리지 않았어요",tip:'"'+tw+'"를 명확하게 발음해 보세요'});
      }
    }
  });
  var wordDisplay=results.map(function(r){
    var col=r.ok?"#059669":"#DC2626";
    var bg=r.ok?"#ECFDF5":"#FEE2E2";
    return '<span style="display:inline-block;margin:2px 3px;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600;background:'+bg+';color:'+col+'">'+r.t+'</span>';
  }).join('');
  return {score:score,issues:issues,wordDisplay:wordDisplay,matched:matched,total:total};
}

function wordPhon(w){
  var cl=w.toLowerCase().replace(/[^a-z]/g,'');
  return PH[cl]||null;
}

function wordByWordHTML(eng,phon){
  var words=eng.trim().split(/\s+/);
  var chunks=phon?phon.split('-'):[];
  
  function norm(w){return w.toLowerCase().replace(/[^a-z]/g,'');}
  
  // Function/grammar words: never in phon hints, use PH dict only
  var GRAMMAR={
    the:1,a:1,an:1,i:1,id:1,ill:1,ive:1,im:1,
    you:1,he:1,she:1,it:1,we:1,they:1,
    me:1,him:1,her:1,us:1,them:1,
    my:1,your:1,his:1,its:1,our:1,their:1,
    this:1,that:1,these:1,those:1,who:1,what:1,which:1,whose:1,
    in:1,on:1,at:1,to:1,for:1,of:1,with:1,by:1,from:1,up:1,out:1,
    about:1,into:1,through:1,before:1,after:1,between:1,
    without:1,within:1,under:1,over:1,around:1,off:1,
    and:1,but:1,or:1,so:1,if:1,as:1,because:1,while:1,
    when:1,where:1,how:1,why:1,whether:1,unless:1,since:1,until:1,though:1,
    is:1,are:1,was:1,were:1,be:1,been:1,being:1,am:1,
    have:1,has:1,had:1,do:1,does:1,did:1,done:1,
    can:1,could:1,will:1,would:1,shall:1,should:1,may:1,might:1,must:1,
    not:1,no:1,yes:1,very:1,really:1,just:1,also:1,too:1,only:1,
    even:1,already:1,still:1,now:1,then:1,here:1,there:1,
    more:1,most:1,less:1,least:1,much:1,many:1,some:1,any:1,all:1,both:1,
    well:1,quite:1,back:1,away:1,again:1,please:1,thank:1,sorry:1,
    id:1,ive:1,im:1,ill:1
  };
  
  // Count syllables by vowel groups
  function sylCount(word){
    var w=norm(word);
    if(!w) return 1;
    var n=0,inV=false;
    for(var i=0;i<w.length;i++){
      var isV='aeiou'.indexOf(w[i])>=0||(w[i]==='y'&&i>0&&i===w.length-1);
      if(isV&&!inV){n++;inV=true;}
      else if(!isV){inV=false;}
    }
    if(w.length>2&&w[w.length-1]==='e'&&'aeiou'.indexOf(w[w.length-2])<0&&n>1) n--;
    return Math.max(1,n);
  }
  
  // Check if a phon chunk likely corresponds to a word
  function chunkMatchesWord(chunk,word){
    var c=chunk.toLowerCase().replace(/[^a-z]/g,'');
    var w=norm(word);
    if(!c||!w) return false;
    var c0=c[0], w0=w[0];
    if(c0===w0) return true;
    // Both start with vowel sound (schwa 'uh'/'ih' matches any vowel start)
    if('aeiou'.indexOf(c0)>=0 && 'aeiou'.indexOf(w0)>=0) return true;
    // c/k equivalence
    if((c0==='k'&&w0==='c')||(c0==='c'&&w0==='k')) return true;
    // j/y equivalence
    if((c0==='j'&&(w0==='y'||w0==='j'))||(c0==='y'&&w0==='j')) return true;
    // f/ph equivalence
    if(c0==='f'&&w0==='p'&&w[1]==='h') return true;
    return false;
  }
  
  var wordPhons=new Array(words.length).fill('');
  var ci=0;
  
  words.forEach(function(word,wi){
    var k=norm(word);
    
    if(GRAMMAR[k]){
      // Grammar word: PH dict only, don't consume phon chunks
      wordPhons[wi]=wordPhon(k)||k;
    } else {
      // Content word: check if phon chunk matches this word
      if(ci<chunks.length && chunkMatchesWord(chunks[ci],word)){
        var sc=sylCount(word);
        var group=chunks.slice(ci,Math.min(ci+sc,chunks.length));
        wordPhons[wi]=group.join('-');
        ci+=group.length;
      } else {
        // Not covered by phon: use PH dict or fallback
        var ph=wordPhon(k);
        if(ph){
          wordPhons[wi]=ph;
        } else {
          // Simple English phonetic rule fallback
          var fb=k
            .replace(/tion$/,'shun').replace(/tions$/,'shunz')
            .replace(/sion$/,'zhun').replace(/ous$/,'us')
            .replace(/ness$/,'nis').replace(/ment$/,'munt')
            .replace(/able$/,'uh-bul').replace(/ible$/,'ih-bul')
            .replace(/ical$/,'ih-kul').replace(/ize$/,'yz')
            .replace(/ful$/,'ful').replace(/less$/,'lis')
            .replace(/ing$/,'ing').replace(/ings$/,'ingz')
            .replace(/al$/,'ul').replace(/ly$/,'lee')
            .replace(/gy$/,'jee').replace(/ty$/,'tee')
            .replace(/ed$/,'d').replace(/er$/,'er')
            .replace(/^kn/,'n').replace(/^wr/,'r')
            .replace(/ght$/,'t').replace(/gh/,'');
          if(fb) wordPhons[wi]=fb.charAt(0).toUpperCase()+fb.slice(1);
        }
      }
    }
  });
  
  // ── Render word cards ──
  var html='<div style="display:flex;flex-wrap:wrap;gap:4px 14px;">';
  words.forEach(function(word,i){
    var ph=wordPhons[i]||'';
    var hasStress=ph&&/[A-Z]{2,}/.test(ph);
    var phDisp='';
    if(ph){
      phDisp=ph.split('-').map(function(syl,j){
        var st=/[A-Z]/.test(syl)&&syl!==syl.toLowerCase();
        return (j>0?'<span style="opacity:.25;font-size:9px">·</span>':'')
          +(st
            ?'<b style="color:#111;font-size:12px;font-family:monospace">'+syl+'</b>'
            :'<span style="color:#555;font-size:11px;font-family:monospace">'+syl+'</span>');
      }).join('');
    }
    html+='<div style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;margin-bottom:8px;">'
      +'<span style="font-size:15px;font-weight:'+(hasStress?'800':'500')+';color:'+(hasStress?'#111':'#444')+'">'+word+'</span>'
      +(phDisp
        ?'<div style="background:#f0f0f0;border-radius:5px;padding:2px 7px;white-space:nowrap;line-height:1.5">'+phDisp+'</div>'
        :'<div style="height:20px;"></div>')
      +'</div>';
  });
  html+='</div>';
  return html;
}

function errFor(code){
  return {
    'not-allowed':'주소창 🔒 → 마이크 허용 후 다시 시도해 주세요',
    'permission-denied':'주소창 🔒 → 마이크 허용 후 다시 시도해 주세요',
    'no-speech':'음성이 감지되지 않았어요. 더 크게 말해보세요',
    'network':'네트워크 오류입니다',
    'audio-capture':'마이크가 감지되지 않습니다'
  }[code]||'오류: '+code;
}

function startMic(onInterim,onFinal,onErr){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){onErr('Chrome 또는 Edge 브라우저를 사용해 주세요');return null;}
  
  var finalText='',interimText='';
  var silTimer=null,stopped=false,r=null;
  
  function clearSil(){clearTimeout(silTimer);silTimer=null;}
  function stop(){
    if(stopped) return; stopped=true; clearSil();
    try{r.abort();}catch(e){}
    var t=(finalText+' '+interimText).trim();
    if(t) onFinal(t);
  }
  function setSil(){
    clearSil();
    if(finalText.trim()) silTimer=setTimeout(stop,4000);
  }
  
  function mkR(){
    var nr=new SR();
    nr.lang='en-US'; nr.interimResults=true;
    nr.continuous=false; // false = more stable on Android
    nr.maxAlternatives=1;
    nr.onresult=function(e){
      if(stopped) return;
      var fin='',itr='';
      for(var i=e.resultIndex;i<e.results.length;i++){
        var t=e.results[i][0].transcript;
        if(e.results[i].isFinal) fin+=t+' '; else itr=t;
      }
      if(fin) finalText+=fin;
      interimText=itr;
      onInterim((finalText+interimText).trim());
      setSil();
    };
    nr.onerror=function(e){
      if(stopped) return;
      if(e.error==='no-speech'||e.error==='aborted') return;
      stopped=true; clearSil(); onErr(errFor(e.error));
    };
    nr.onend=function(){
      if(stopped) return;
      // Restart to keep recording (simulates continuous mode)
      try{r=mkR();r.start();}catch(ex){
        // Browser blocked restart — use silence timer
        setSil();
      }
    };
    return nr;
  }
  
  r=mkR();
  try{r.start();}catch(e){onErr('마이크를 시작할 수 없습니다');return null;}
  return {stop:stop};
}

function stopMic(ref){if(ref){try{ref.stop();}catch(e){}}return null;}

function speakEng(txt){
  if(!window.speechSynthesis||!txt) return;
  speechSynthesis.cancel();

  function doSpeak(){
    var voices=speechSynthesis.getVoices();

    // Best natural English voices by priority
    // iOS: Samantha (enhanced), Aaron, Nicky
    // Android: English (US) Google, or local en-US
    // Windows: Zira, David, Mark
    var PREF=[
      'Samantha','com.apple.ttsbundle.Samantha-premium',
      'com.apple.ttsbundle.Samantha-compact',
      'com.apple.voice.enhanced.en-US.Nicky',
      'com.apple.ttsbundle.Daniel-premium',
      'Aaron','Nicky','Martha','Alex',
      'Google US English','Microsoft Zira','Microsoft David',
      'Karen','Daniel','Moira','Rishi'
    ];

    var v=null;

    // 1. Try by exact name
    for(var i=0;i<PREF.length&&!v;i++){
      for(var j=0;j<voices.length;j++){
        if(voices[j].name===PREF[i]){v=voices[j];break;}
      }
    }

    // 2. Any en-US voice that looks premium/enhanced
    if(!v){
      for(var j=0;j<voices.length;j++){
        var vn=voices[j].name.toLowerCase();
        var vl=voices[j].lang;
        if(vl==='en-US'&&(vn.indexOf('premium')>=0||vn.indexOf('enhanced')>=0)){
          v=voices[j];break;
        }
      }
    }

    // 3. Any en-US local (better quality than network)
    if(!v){
      for(var j=0;j<voices.length;j++){
        if(voices[j].lang==='en-US'&&voices[j].localService){v=voices[j];break;}
      }
    }

    // 4. Any en-US
    if(!v){
      for(var j=0;j<voices.length;j++){
        if(voices[j].lang==='en-US'){v=voices[j];break;}
      }
    }

    // 5. Any English
    if(!v){
      for(var j=0;j<voices.length;j++){
        if(voices[j].lang.startsWith('en')){v=voices[j];break;}
      }
    }

    // Build utterance — split at natural pause points for better prosody
    // Commas and mid-sentence pauses make TTS sound much more natural
    var u=new SpeechSynthesisUtterance(txt);
    if(v) u.voice=v;
    u.lang='en-US';

    // Tune rate/pitch per sentence type
    var isQuestion=txt.trim().endsWith('?');
    var isExclamation=txt.trim().endsWith('!');
    var wordCount=txt.trim().split(/\s+/).length;

    // Slightly slower for longer sentences, question rises naturally
    u.rate = wordCount<=5 ? 0.82 : wordCount<=9 ? 0.85 : 0.88;
    u.pitch = isQuestion ? 1.05 : isExclamation ? 1.02 : 1.0;
    u.volume=1;

    u.onstart=function(){S.speaking=true;render();};
    u.onend=function(){S.speaking=false;render();};
    u.onerror=function(){S.speaking=false;render();};

    speechSynthesis.speak(u);
    if(speechSynthesis.paused) speechSynthesis.resume();
  }

  // iOS Safari: voices load async — retry a couple times if empty
  var voices=speechSynthesis.getVoices();
  if(voices.length>0){
    setTimeout(doSpeak,120);
  } else {
    var tries=0;
    var poll=setInterval(function(){
      if(speechSynthesis.getVoices().length>0||tries>10){
        clearInterval(poll);
        setTimeout(doSpeak,120);
      }
      tries++;
    },200);
  }
}

function speakIt(){
  var s=(DATA[S.cat]||[])[S.idx];
  if(s) speakEng(s[0]);
}

}

function analHTML(res,loading){

  var wd=res.wordDisplay?
    '<div style="background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.05)">'

        +'<div><div style="font-size:12px;color:#D97706;font-weight:700;margin-bottom:3px">"'+iss.word+'" → '+iss.said+'</div>'
        +'<div style="font-size:11px;color:#555;margin-bottom:3px">'+iss.issue+'</div>'

    issH='<div style="background:#fff;border-radius:12px;padding:13px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.05)">'+rows+'</div>';
  } else {
    issH='<div style="background:#ECFDF5;border-radius:12px;padding:10px;font-size:12px;color:#059669;font-weight:600;text-align:center;margin-bottom:10px">모든 단어가 정확하게 들렸어요 🎉</div>';
  }

    +'<div style="height:100%;width:'+sc+'%;background:'+col+';border-radius:4px;transition:width .9s ease"></div></div>'
    +'<span style="font-weight:800;font-size:16px;color:'+col+';min-width:40px">'+sc+'%</span></div></div>';
  return wd+issH+bar;

// ─── MIC TOGGLES ────────────────────────────────────
function toggleCRec(){
  if(S.cRec){stopMic(S.cRef);S.cRef=null;set({cRec:false});return;}
  set({cRec:true,cErr:'',cResult:null,cLive:'',cAnalyzing:false});
  var ref=startMic(
    function(t){if(S.cRec) set({cLive:t});},
    function(t){S.cRef=null;set({cRec:false});if(t.trim()) runAnalyze(t,'',false);},
    function(msg){S.cRef=null;set({cRec:false,cErr:msg});}
  );
  S.cRef=ref; render();
}
function togglePRec(){
  if(S.rec){stopMic(S.recRef);S.recRef=null;set({rec:false});return;}
  set({rec:true,err:'',result:null,live:'',analyzing:false});
  var target=((DATA[S.cat]||[])[S.idx]||[])[0]||'';
  var ref=startMic(
    function(t){if(S.rec) set({live:t});},
    function(t){S.recRef=null;set({rec:false});if(t.trim()) runAnalyze(t,target,true);},
    function(msg){S.recRef=null;set({rec:false,err:msg});}
  );
  S.recRef=ref; render();
}
function runAnalyze(txt,target,isPractice){
  if(isPractice) set({analyzing:true,result:null});
  else set({cAnalyzing:true,cResult:null});
  setTimeout(function(){
    var r=analyze(txt.trim(),target);
    if(isPractice) set({analyzing:false,result:r});
    else set({cAnalyzing:false,cResult:r});
  },400);
}

      +(S.err?'<div style="margin-top:7px;padding:6px 10px;background:#FEE2E2;border-radius:8px;font-size:11px;color:#DC2626">'+S.err+'</div>':'')
      +'</div>'
      +analHTML(S.result,S.analyzing)
      +(!S.result&&!S.analyzing&&!S.live?'<div style="text-align:center;color:#bbb;padding:18px 0"><div style="font-size:28px;margin-bottom:7px">👂</div><div style="font-size:12px;line-height:1.6">녹음하면 단어별로<br>얼마나 정확한지 채점해 드립니다</div></div>':'')
      +'</div>';

    app.innerHTML='<div style="background:#f5f0eb;min-height:100vh;display:flex;flex-direction:column">'
      +'<div style="background:#1a1a1a;padding:11px 14px;display:flex;align-items:center;gap:9px;flex-shrink:0">'
      +'<button onclick="goPCats()" style="background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:9px;padding:5px 10px;cursor:pointer;font-size:11px">← 카테고리</button>'
      +'<div style="font-weight:700;font-size:13px;color:'+cat.color+'">'+cat.name+'</div>'
      +'<div style="margin-left:auto;display:flex;align-items:center;gap:8px">'
      +'<span style="font-family:monospace;font-size:11px;color:#888">'+(S.idx+1)+'/'+sents.length+'</span>'
      +'<button onclick="saveSent()" title="저장" style="background:'+(saved?'#FF6B35':'rgba(255,255,255,.12)')+';border:none;color:#fff;border-radius:8px;padding:4px 9px;cursor:pointer;font-size:14px;line-height:1">🔖</button>'
      +(S.savedMsg?'<span style="font-size:11px;color:#4ade80;font-weight:700">'+S.savedMsg+'</span>':'')
      +'</div></div>'
      +'<div style="background:#fff;padding:5px 14px;display:flex;gap:12px;flex-shrink:0;border-bottom:1px solid #f0f0f0;font-size:10px;color:#aaa">'
      +'<span><b style="color:#1a1a1a">대문자</b>=강세</span><span style="color:#888">소문자=약함</span><span>·=음절구분</span>'
      +'</div>'
      +'<div style="flex:1;display:flex;overflow:hidden;min-height:0">'
      +leftPanel+rightPanel
      +'</div>'
      +'<div style="padding:11px 14px;display:flex;gap:9px;background:#fff;border-top:1px solid #f0f0f0;flex-shrink:0">'
      +'<button onclick="prevS()" '+(S.idx===0?'disabled':'')+' style="flex:1;padding:11px;background:#f5f5f5;border:none;border-radius:13px;font-size:13px;font-weight:700;color:'+(S.idx===0?'#ccc':'#1a1a1a')+';cursor:'+(S.idx===0?'not-allowed':'pointer')+'">← 이전</button>'
      +'<button onclick="nextS()" style="flex:1;padding:11px;background:'+cat.color+';border:none;border-radius:13px;font-size:13px;font-weight:800;color:#fff;cursor:pointer">다음 →</button>'
      +'</div></div>';
  }
}

// Preload voices for iOS Safari
if(window.speechSynthesis){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};
}
render();
</script>
</body>
</html>
