// LOCAL PRONUNCIATION ANALYSIS (no API needed)
// ════════════════════════════════════════════════════
function localAnalyze(transcript) {
  const words = transcript.trim().split(/\s+/);
  const issues = [];
  const lower = transcript.toLowerCase();

  // Common Korean accent simulation rules
  const simMap = [
    [/\bthe\b/gi, 'duh'], [/\bthis\b/gi, 'dis'], [/\bthat\b/gi, 'dat'],
    [/\bthey\b/gi, 'dey'], [/\bthem\b/gi, 'dem'], [/\bthere\b/gi, 'dere'],
    [/\bthink\b/gi, 'tink'], [/\bthings?\b/gi, 'ting'], [/\bthree\b/gi, 'tree'],
    [/\bwith\b/gi, 'wit'], [/\bbreath\b/gi, 'breet'], [/\bthank\b/gi, 'tank'],
    [/\bvery\b/gi, 'bery'], [/\bover\b/gi, 'oh-buh'],
    [/rice\b/gi, 'lice'], [/right\b/gi, 'light'], [/\bread\b/gi, 'lead'],
    [/\broad\b/gi, 'load'], [/really/gi, 'rearry'],
    [/tion\b/gi, 'sheon'], [/sion\b/gi, 'sheon'],
    [/\bworld\b/gi, 'weld'], [/\bgirl\b/gi, 'gerl'],
  ];

  let nativeHears = transcript;
  simMap.forEach(([pat, rep]) => { nativeHears = nativeHears.replace(pat, rep); });

  // Identify problematic words
  const problemPatterns = [
    { match: /^th/i, issue: "TH → D/T 로 들릴 수 있어요", tip: "혀를 이 사이에 살짝 대고 바람을 내보내세요" },
    { match: /r[aeiou]/i, issue: "R 발음이 L처럼 들릴 수 있어요", tip: "혀를 어디에도 닿지 않게 들어올리세요" },
    { match: /tion$/i, issue: "'-tion' 발음 주의", tip: "'-tion'은 항상 '-shun'으로 발음해요" },
    { match: /ght$/i, issue: "묵음 처리 필요", tip: "'-ght'의 gh는 묵음이에요" },
    { match: /[aeiou]{2}/i, issue: "모음 연속 발음 주의", tip: "두 모음이 연속될 때 자연스럽게 이어서 발음하세요" },
  ];

  words.forEach(word => {
    const clean = word.replace(/[^a-zA-Z]/g, '');
    if (!clean || clean.length < 3) return;
    for (const pp of problemPatterns) {
      if (pp.match.test(clean) && issues.length < 3) {
        issues.push({ word: clean, issue: pp.issue, tip: pp.tip });
        break;
      }
    }
  });

  const complexity = words.length;
  const hasIssues = issues.length > 0;
  const score = Math.min(95, Math.max(45, 80 - issues.length * 8 + Math.min(10, complexity)));

  return { native_hears: nativeHears, issues, score };
}

// ── Speech Recognition ──
function errMsg(code) {
  return {
    'not-allowed': '주소창 🔒 아이콘 → 마이크 허용 후 다시 시도해 주세요',
    'permission-denied': '주소창 🔒 아이콘 → 마이크 허용 후 다시 시도해 주세요',
    'no-speech': '음성이 감지되지 않았어요. 더 크게 말해보세요',
    'network': '네트워크 오류입니다',
    'audio-capture': '마이크가 감지되지 않습니다',
  }[code] || `오류: ${code}`;
}

function startMic(onInterim, onFinal, onErr) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { onErr('Chrome 또는 Edge 브라우저를 사용해 주세요'); return null; }
  const r = new SR();
  r.lang = 'en-US';
  r.interimResults = true;
  r.continuous = true; // Keep listening until manually stopped
  r.maxAlternatives = 1;
  let fullTranscript = '';
  let silenceTimer = null;

  r.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t + ' ';
      else interim += t;
    }
    if (final) fullTranscript += final;
    onInterim(fullTranscript + interim);
    // Reset silence timer — auto-analyze after 3s of silence
    clearTimeout(silenceTimer);
    if (fullTranscript.trim()) {
      silenceTimer = setTimeout(() => {
        onFinal(fullTranscript.trim());
      }, 3000);
    }
  };
  r.onerror = e => onErr(errMsg(e.error));
  r.onend = () => {
    if (fullTranscript.trim()) onFinal(fullTranscript.trim());
  };
  try { r.start(); return r; }
  catch(e) { onErr('마이크를 시작할 수 없습니다'); return null; }
}

function stopMic(recogRef) {
  if (recogRef) { try { recogRef.stop(); recogRef.abort(); } catch(e) {} }
}

function speakText(txt) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.lang = 'en-US'; u.rate = 0.82;
  u.onstart = () => setState({ speaking: true });
  u.onend = () => setState({ speaking: false });
  speechSynthesis.speak(u);
}

// ── sl helper (phonetic display) ──
function slHTML(s) {
  if (!s) return '';
  return s.split('·').map((p, i) => {
    const stressed = /[A-Z]/.test(p) && p !== p.toLowerCase();
    return (i > 0 ? '<span style="opacity:.3;margin:0 1px">·</span>' : '') +
      (stressed ? `<b style="color:#1a1a1a;font-size:13px">${p}</b>` : `<span style="color:#888;font-size:11px">${p}</span>`);
  }).join('');
}

          <div style="font-size:12px;color:#999;flex-shrink:0">명확도</div>
          <div style="flex:1;height:7px;background:#f3f4f6;border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${sc}%;background:${scCol};border-radius:4px"></div>
          </div>
          <div style="font-weight:800;font-size:17px;color:${scCol};min-width:42px">${sc}%</div>
        </div>
      </div>
    </div>` : ''}
    ${!checkerResult && !checkerAnalyzing ? `
    <div style="background:#fff;border-radius:18px;padding:20px;text-align:center;color:#bbb;box-shadow:0 2px 10px rgba(0,0,0,.04)">
      <div style="font-size:11px;color:#aaa;margin-bottom:8px;font-weight:600;letter-spacing:1px">HOW IT WORKS</div>
      <div style="font-size:13px;color:#888;line-height:1.7">1. 마이크 버튼을 누르고 영어로 말하세요<br>2. 3초 침묵 시 자동으로 분석됩니다<br>3. 원어민 귀에 어떻게 들리는지 확인하세요</div>
    </div>` : ''}
  </div>
</div>`;
}

function renderCats() {
  return `
<div style="background:#f5f0eb;min-height:100vh">
  <div style="background:#1a1a1a;padding:16px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <button onclick="goHome()" style="background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:9px;padding:6px 12px;cursor:pointer;font-size:12px">← 홈</button>
    <div style="font-weight:700;font-size:15px;color:#fff">Practice Course</div>
  </div>
  <div style="padding:0 18px">
    <div style="font-weight:700;font-size:18px;margin-bottom:5px">카테고리 선택</div>
    <div style="font-size:13px;color:#888;margin-bottom:20px">카테고리별 50개 예문 · 발음 표기 · 팁</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
      ${CATS.map(c => `
      <div onclick="startDrill('${c.id}')" style="background:${c.bg};border-radius:20px;padding:20px 16px;cursor:pointer;border:2px solid ${c.color}20;position:relative;overflow:hidden">
        <div style="width:42px;height:42px;border-radius:13px;background:${c.color};display:flex;align-items:center;justify-content:center;margin-bottom:11px">
          <span style="color:#fff;font-weight:800;font-size:12px">${c.en.slice(0,2).toUpperCase()}</span>
        </div>
        <div style="font-weight:700;font-size:13px;color:#1a1a1a;margin-bottom:3px">${c.name}</div>
        <div style="font-size:11px;color:#888">${c.desc}</div>
        <div style="position:absolute;bottom:-10px;right:-5px;font-size:40px;opacity:.06">${c.en[0]}</div>
      </div>`).join('')}
    </div>
  </div>
</div>`;
}

function renderDrill() {
  const cat = CATS.find(c => c.id === state.cat);
  if (!cat) return '';
  const sents = DATA[cat.id] || [];
  const s = sents[state.idx];
  if (!s) return '<div style="padding:40px;text-align:center;color:#888">문장을 불러오는 중...</div>';
  const [eng, kor, phonetic, tip] = s;
  const total = sents.length;
  const { rec, live, result, err, ok, analyzing, speaking } = state;
  const sc = result ? Math.max(0, Math.min(100, result.score || 70)) : 0;
  const scCol = sc >= 80 ? '#059669' : sc >= 55 ? '#D97706' : '#DC2626';
  const into = eng.endsWith('?') ? '↗ 상승 Rising' : eng.includes(',') ? '↗↘ 상승-하강' : '↘ 하강 Falling';
  const intoCol = eng.endsWith('?') ? '#2563EB' : eng.includes(',') ? '#7C3AED' : '#D97706';

  return `
<div style="background:#f5f0eb;min-height:100vh;display:flex;flex-direction:column">
  <div style="background:#1a1a1a;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0">
    <button onclick="goPCats()" style="background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:9px;padding:6px 10px;cursor:pointer;font-size:11px">← 카테고리</button>
    <div style="font-weight:700;font-size:13px;color:${cat.color}">${cat.name}</div>
    <div style="margin-left:auto;font-family:monospace;font-size:11px;color:#888">${state.idx + 1} / ${total}</div>
  </div>
  <div style="background:#fff;padding:7px 16px;display:flex;gap:14px;flex-shrink:0;border-bottom:1px solid #f0f0f0;font-size:11px;color:#aaa">
    <span><b style="color:#1a1a1a">대문자</b> = 강세 음절</span>
    <span><span style="color:#888">소문자</span> = 약한 음절</span>
    <span>· = 음절 구분</span>
  </div>
  <div style="flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0">
    <!-- LEFT: textbook -->
    <div style="width:50%;overflow-y:auto;padding:16px 14px;border-right:1px solid #e8e8e8">
      <div style="font-family:monospace;font-size:10px;color:#ccc;letter-spacing:1px;text-transform:uppercase;margin-bottom:9px">문장 #${state.idx + 1}</div>
      <div style="font-size:18px;font-weight:800;line-height:1.4;margin-bottom:5px;color:#1a1a1a">${eng}</div>
      <div style="font-size:12px;color:#888;margin-bottom:18px">${kor}</div>

      <div style="font-size:10px;color:#ccc;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px">발음 표기</div>
      <div style="background:#f8f8f8;border:1px solid #eee;border-radius:9px;padding:9px 11px;font-family:monospace;margin-bottom:16px;line-height:1.6;font-size:13px">${slHTML(phonetic)}</div>

      <div style="font-size:10px;color:#ccc;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px">억양</div>
      <div style="margin-bottom:16px"><span style="padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;background:${intoCol}18;color:${intoCol}">${into}</span></div>

      <div style="font-size:10px;color:#ccc;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px">발음 팁</div>
      <div style="font-size:12px;padding:8px 10px;background:#fff;border-radius:8px;border-left:3px solid ${cat.color};color:#555;line-height:1.6;margin-bottom:18px;box-shadow:0 1px 4px rgba(0,0,0,.04)">${tip}</div>

      <button onclick="speakSentence()" style="background:${speaking ? '#059669' : '#1a1a1a'};color:#fff;border:none;border-radius:11px;padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer">
        ${speaking ? '▶ 재생 중...' : '▶ 원어민 발음 듣기'}
      </button>
    </div>

    <!-- RIGHT: practice -->
    <div style="flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px">
      <div style="background:#fff;border-radius:18px;padding:20px 14px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.05)">
        <button onclick="togglePRec()" style="width:68px;height:68px;border-radius:50%;background:${rec ? '#FEE2E2' : '#1a1a1a'};border:3px solid ${rec ? '#DC2626' : '#1a1a1a'};font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;${rec ? 'animation:pulse 1.4s ease infinite' : ''}">
          ${rec ? '⏹' : '🎙'}
        </button>
        <div style="font-weight:700;font-size:12px;margin-bottom:3px;color:${rec ? '#DC2626' : '#1a1a1a'}">${rec ? '🔴 듣고 있어요...' : '마이크 버튼'}</div>
        <div style="font-size:11px;color:#888">${rec ? '3초 침묵 시 자동 분석' : '왼쪽 문장을 읽어보세요'}</div>
        ${live ? `<div style="margin-top:9px;padding:6px 10px;background:#EFF6FF;border-radius:9px;font-weight:600;font-size:13px;color:#2563EB;text-align:left">"${live}"</div>` : ''}
        ${err ? `<div style="margin-top:7px;padding:6px 10px;background:#FEE2E2;border-radius:8px;font-size:11px;color:#DC2626">${err}</div>` : ''}
        ${ok ? `<div style="margin-top:7px;padding:6px 10px;background:#ECFDF5;border-radius:8px;font-size:11px;color:#059669">${ok}</div>` : ''}
      </div>
      ${analyzing ? `<div style="background:#fff;border-radius:12px;padding:13px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.04)"><div class="spin"></div><span style="font-size:13px;color:#666">분석 중...</span></div>` : ''}
      ${result && !analyzing ? `
      <div style="display:flex;flex-direction:column;gap:9px">
        <div style="background:#EFF6FF;border-radius:14px;padding:13px">
          <div style="font-size:10px;color:#2563EB;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;font-weight:700">📡 원어민 귀에 이렇게 들림</div>
          <div style="font-family:monospace;font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.6">"${result.native_hears}"</div>
        </div>
        ${result.issues && result.issues.length > 0 ? `
        <div style="background:#fff;border-radius:14px;padding:13px;box-shadow:0 2px 8px rgba(0,0,0,.04)">
          ${result.issues.map((iss, i) => `
          <div style="display:flex;gap:8px;${i < result.issues.length-1 ? 'padding-bottom:8px;margin-bottom:8px;border-bottom:1px solid #f3f4f6' : ''}">
            <div style="width:20px;height:20px;border-radius:50%;background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
            <div>
              <div style="font-size:12px;color:#D97706;font-weight:700;margin-bottom:2px">${iss.word}</div>
              <div style="font-size:11px;color:#555;margin-bottom:2px">${iss.issue}</div>
              <div style="font-size:11px;color:#2563EB">💡 ${iss.tip}</div>
            </div>
          </div>`).join('')}
        </div>` : `<div style="background:#ECFDF5;border-radius:12px;padding:10px;font-size:12px;color:#059669;font-weight:600;text-align:center">자연스럽게 들렸어요 🎉</div>`}
        <div style="background:#fff;border-radius:12px;padding:11px 13px;box-shadow:0 2px 8px rgba(0,0,0,.04)">
          <div style="display:flex;align-items:center;gap:9px">
            <span style="font-size:11px;color:#999">명확도</span>
            <div style="flex:1;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${sc}%;background:${scCol};border-radius:3px"></div>
            </div>
            <span style="font-weight:800;font-size:15px;color:${scCol};min-width:36px">${sc}%</span>
          </div>
        </div>
      </div>` : ''}
      ${!result && !analyzing && !live ? `
      <div style="text-align:center;color:#bbb;padding:18px 0">
        <div style="font-size:28px;margin-bottom:7px">👂</div>
        <div style="font-size:12px;line-height:1.6">녹음하면 원어민 귀에<br>어떻게 들리는지 분석해 드립니다</div>
      </div>` : ''}
    </div>
  </div>
  <div style="padding:11px 16px;display:flex;gap:9px;background:#fff;border-top:1px solid #f0f0f0;flex-shrink:0">
    <button onclick="prevSent()" ${state.idx === 0 ? 'disabled' : ''} style="flex:1;padding:11px;background:#f5f5f5;border:none;border-radius:13px;font-size:13px;font-weight:700;color:${state.idx === 0 ? '#ccc' : '#1a1a1a'};cursor:${state.idx === 0 ? 'not-allowed' : 'pointer'}">← 이전</button>
    <button onclick="nextSent()" style="flex:1;padding:11px;background:${cat.color};border:none;border-radius:13px;font-size:13px;font-weight:800;color:#fff;cursor:pointer">다음 →</button>
  </div>
</div>`;
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  switch (state.screen) {
    case 'home': app.innerHTML = renderHome(); break;
    case 'checker': app.innerHTML = renderChecker(); break;
    case 'cats': app.innerHTML = renderCats(); break;
    case 'drill': app.innerHTML = renderDrill(); break;
  }
}

// ── Navigation ──
function goHome() {
  stopAllRec();
  setState({ screen: 'home', result: null, live: '', err: '', ok: '', checkerResult: null, checkerLive: '', checkerErr: '', checkerOk: '', speaking: false });
}
function goChecker() {
  stopAllRec();
  setState({ screen: 'checker', checkerResult: null, checkerLive: '', checkerErr: '', checkerOk: '', checkerRec: false });
}
function goPCats() {
  stopAllRec();
  setState({ screen: 'cats' });
}
function startDrill(catId) {
  stopAllRec();
  setState({ screen: 'drill', cat: catId, idx: 0, result: null, live: '', err: '', ok: '', rec: false, analyzing: false, speaking: false });
}
function prevSent() {
  if (state.idx > 0) {
    stopPRec();
    setState({ idx: state.idx - 1, result: null, live: '', err: '', ok: '', rec: false });
  }
}
function nextSent() {
  const sents = DATA[state.cat] || [];
  stopPRec();
  if (state.idx < sents.length - 1) {
    setState({ idx: state.idx + 1, result: null, live: '', err: '', ok: '', rec: false });
  } else {
    setState({ idx: 0, result: null, live: '', err: '', ok: '', rec: false });
  }
}

// ── Checker Mic ──
function toggleCheckerRec() {
  if (state.checkerRec) {
    stopCheckerRec();
  } else {
    startCheckerRec();
  }
}
function startCheckerRec() {
  setState({ checkerRec: true, checkerErr: '', checkerOk: '', checkerResult: null, checkerLive: '' });
  const recog = startMic(
    t => setState({ checkerLive: t }),
    t => { stopCheckerRec(); analyzeChecker(t); },
    msg => setState({ checkerRec: false, checkerErr: msg, checkerRecogRef: null })
  );
  if (recog) setState({ checkerRecogRef: recog });
}
function stopCheckerRec() {
  stopMic(state.checkerRecogRef);
  setState({ checkerRec: false, checkerRecogRef: null });
}
function analyzeChecker(txt) {
  setState({ checkerAnalyzing: true, checkerOk: '✅ 음성 인식 완료, 분석 중...', checkerResult: null });
  setTimeout(() => {
    const result = localAnalyze(txt);
    setState({ checkerAnalyzing: false, checkerResult: result, checkerOk: '' });
  }, 600);
}

// ── Practice Mic ──
function togglePRec() {
  if (state.rec) {
    stopPRec();
  } else {
    startPRec();
  }
}
function startPRec() {
  setState({ rec: true, err: '', ok: '', result: null, live: '' });
  const recog = startMic(
    t => setState({ live: t }),
    t => { stopPRec(); analyzePractice(t); },
    msg => setState({ rec: false, err: msg, recogRef: null })
  );
  if (recog) setState({ recogRef: recog });
}
function stopPRec() {
  stopMic(state.recogRef);
  setState({ rec: false, recogRef: null });
}
function analyzePractice(txt) {
  setState({ analyzing: true, ok: '✅ 음성 인식 완료, 분석 중...', result: null });
  setTimeout(() => {
    const result = localAnalyze(txt);
    setState({ analyzing: false, result, ok: '' });
  }, 600);
}

function stopAllRec() {
  stopMic(state.checkerRecogRef);
  stopMic(state.recogRef);
  if (window.speechSynthesis) speechSynthesis.cancel();
  state.checkerRec = false;
  state.checkerRecogRef = null;
  state.rec = false;
  state.recogRef = null;
  state.speaking = false;
}

function speakSentence() {
  const sents = DATA[state.cat] || [];
  const s = sents[state.idx];
  if (!s) return;
  speakText(s[0]);
}

// ── Init ──
render();
</script>
</body>
</html>
