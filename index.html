function normW(w){ return w.toLowerCase().replace(/[^a-z]/g,''); }
function lev(a,b){
  var m=a.length,n=b.length,dp=[];
  for(var i=0;i<=m;i++){dp[i]=[i];}
  for(var j=0;j<=n;j++){dp[0][j]=j;}
  for(var i=1;i<=m;i++){
    for(var j=1;j<=n;j++){
      dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}
function wMatch(said,tgt){
  if(said===tgt) return true;
  if(tgt.length<=3 && said===tgt) return true;
  if(tgt.startsWith(said)||said.startsWith(tgt)) return true;
  return lev(said,tgt)<=(tgt.length<=4?1:2);
}

function analyze(transcript,targetSentence){
  if(!targetSentence||!targetSentence.trim()){
    // Checker mode - generic
    var words=transcript.trim().split(/\s+/);
    var issues=[];
    words.forEach(function(w){
      var c=normW(w);
      if(!c||c.length<3) return;
      if(TIPS[c] && issues.length<3){
        issues.push({word:c,said:c,issue:TIPS[c].why,tip:TIPS[c].tip});
      }
    });
    var sc=Math.min(88,Math.max(50,78-issues.length*8));
    return {score:sc,issues:issues,wordDisplay:null,matched:0,total:0,heard:transcript};
  }
  var said=transcript.trim().split(/\s+/).map(normW).filter(function(x){return x;});
  var tgt=targetSentence.trim().split(/\s+/).map(normW).filter(function(x){return x;});
  var results=[];
  var si=0;
  for(var ti=0;ti<tgt.length;ti++){
    var tw=tgt[ti];
    if(si<said.length && wMatch(said[si],tw)){
      results.push({t:tw,s:said[si],ok:true}); si++;
    } else if(si+1<said.length && wMatch(said[si+1],tw)){
      results.push({t:tw,s:said[si+1],ok:true}); si+=2;
    } else {
      results.push({t:tw,s:si<said.length?said[si]:null,ok:false});
      if(si<said.length) si++;
    }
  }
  var matched=results.filter(function(r){return r.ok;}).length;
  var total=tgt.length;
  var score=Math.min(97,Math.max(10,Math.round((matched/total)*100)));
  var issues=[];
  results.forEach(function(r){
    if(!r.ok && issues.length<4){
      var tw=r.t;
      var kn=TIPS[tw];
      if(kn){
        issues.push({word:tw,said:r.s||'(빠짐)',issue:(r.s?'"'+r.s+'" 로 들렸어요 — ':'')+kn.why,tip:kn.tip});
      } else if(r.s){
        var tip='';
        if(/^th/i.test(tw)) tip='혀를 이 사이에 살짝 대고 바람 (TH)';
        else if(/^r/i.test(tw)&&/^l/i.test(r.s||'')) tip='R: 혀를 어디에도 닿지 않게';
        else if(lev(tw,r.s||'')<=2) tip='거의 맞아요! 강세 위치를 확인해 보세요';
        else tip='"'+tw+'" 를 천천히 발음해 보세요';
        issues.push({word:tw,said:r.s,issue:'"'+r.s+'" 로 들렸어요',tip:tip});
      } else {
        issues.push({word:tw,said:'(빠짐)',issue:'이 단어가 들리지 않았어요',tip:'"'+tw+'" 를 명확하게 발음해 보세요'});
      }
    }
  });
  var wordDisplay=results.map(function(r){
    var col=r.ok?'#059669':'#DC2626';
    var bg=r.ok?'#ECFDF5':'#FEE2E2';
    return '<span style="display:inline-block;margin:2px 3px;padding:2px 7px;border-radius:6px;font-size:12px;font-weight:600;background:'+bg+';color:'+col+'">'+r.t+'</span>';
  }).join('');
  return {score:score,issues:issues,wordDisplay:wordDisplay,matched:matched,total:total,heard:transcript};
}

function set(patch){Object.assign(S,patch);render();}

// ─── MIC ──────────────────────────────────────────
function errFor(code){
  return {'not-allowed':'주소창 🔒 → 마이크 허용','permission-denied':'주소창 🔒 → 마이크 허용',
    'no-speech':'음성이 감지되지 않았어요','network':'네트워크 오류','audio-capture':'마이크가 없어요'}[code]||'오류: '+code;
}

function startMic(onInterim,onFinal,onErr){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){onErr('Chrome 또는 Edge 브라우저를 사용해 주세요');return null;}
  var r=new SR(); r.lang='en-US'; r.interimResults=true; r.continuous=true;
  var full='',sil=null;
  r.onresult=function(e){
    var itr='',fin='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      var t=e.results[i][0].transcript;
      if(e.results[i].isFinal) fin+=t+' '; else itr+=t;
    }
    if(fin) full+=fin;
    onInterim(full+itr);
    clearTimeout(sil);
    if(full.trim()) sil=setTimeout(function(){onFinal(full.trim());},3000);
  };
  r.onerror=function(e){onErr(errFor(e.error));};
  r.onend=function(){if(full.trim()) onFinal(full.trim());};
  try{r.start();return r;}catch(e){onErr('마이크를 시작할 수 없습니다');return null;}
}
function stopMic(ref){if(ref){try{ref.stop();}catch(e){}}return null;}
function stopAll(){
  S.recRef=stopMic(S.recRef); S.cRef=stopMic(S.cRef);
  if(window.speechSynthesis) speechSynthesis.cancel();
  S.rec=false; S.cRec=false; S.speaking=false;
}

// ─── ACTIONS ──────────────────────────────────────
function goHome(){stopAll();set({screen:'home',result:null,live:'',err:'',cResult:null,cLive:'',cErr:''});}
function goChecker(){stopAll();set({screen:'checker',cResult:null,cLive:'',cErr:'',cRec:false});}
function goPCats(){stopAll();set({screen:'cats'});}

function startDrill(id){
  stopAll();
  set({screen:'drill',cat:id,idx:0,result:null,live:'',err:'',rec:false,analyzing:false,speaking:false});
}
function prevS(){
  if(S.idx>0){stopMic(S.recRef);S.recRef=null;set({idx:S.idx-1,result:null,live:'',err:'',rec:false});}
}
function nextS(){
  var sents=DATA[S.cat]||[];
  stopMic(S.recRef);S.recRef=null;
  var n=S.idx<sents.length-1?S.idx+1:0;
  set({idx:n,result:null,live:'',err:'',rec:false});
}
function speakIt(){
  var s=(DATA[S.cat]||[])[S.idx]; if(!s) return;
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(s[0]); u.lang='en-US'; u.rate=0.82;
  u.onstart=function(){S.speaking=true;render();};
  u.onend=function(){S.speaking=false;render();};
  speechSynthesis.speak(u);
}
function toggleCRec(){
  if(S.cRec){S.cRef=stopMic(S.cRef);set({cRec:false});return;}
  set({cRec:true,cErr:'',cResult:null,cLive:''});
  var ref=startMic(
    function(t){set({cLive:t});},
    function(t){S.cRef=stopMic(S.cRef);set({cRec:false});runAnalyze(t,'');},
    function(msg){set({cRec:false,cErr:msg});}
  );
  S.cRef=ref; render();
}
function togglePRec(){
  if(S.rec){S.recRef=stopMic(S.recRef);set({rec:false});return;}
  set({rec:true,err:'',result:null,live:''});
  var target=((DATA[S.cat]||[])[S.idx]||[])[0]||'';
  var ref=startMic(
    function(t){set({live:t});},
    function(t){S.recRef=stopMic(S.recRef);set({rec:false});runAnalyze(t,target,true);},
    function(msg){set({rec:false,err:msg});}
  );
  S.recRef=ref; render();
}
function runAnalyze(txt,target,isPractice){
  if(isPractice) set({analyzing:true,result:null});
  else set({cAnalyzing:true,cResult:null});
  setTimeout(function(){
    var r=analyze(txt,target);
    if(isPractice) set({analyzing:false,result:r});
    else set({cAnalyzing:false,cResult:r});
  },500);
}

// ─── RENDER HELPERS ───────────────────────────────
function slH(s){
  if(!s) return '';
  return s.split('-').map(function(p,i){
    var st=/[A-Z]/.test(p)&&p!==p.toLowerCase();
    return (i>0?'<span style="opacity:.35;margin:0 1px">·</span>':'')
      +(st?'<b style="color:#1a1a1a;font-size:13px">'+p+'</b>':'<span style="color:#888;font-size:11px">'+p+'</span>');
  }).join('');
}
function h(tag,attrs,content){
  var a='';
  for(var k in attrs) a+=' '+k+'="'+attrs[k]+'"';
  return '<'+tag+a+'>'+(content||'')+'</'+tag+'>';
}
function analHTML(res,loading){
  if(loading) return '<div style="display:flex;align-items:center;gap:10px;color:#888;font-size:13px;padding:12px 0"><div class="sp"></div>분석 중...</div>';
  if(!res) return '';
  var sc=Math.max(0,Math.min(100,res.score||70));
  var col=sc>=80?'#059669':sc>=55?'#D97706':'#DC2626';
  var wd=res.wordDisplay?'<div style="background:#fff;border-radius:13px;padding:12px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.05)"><div style="font-size:10px;color:#999;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;font-weight:700">단어별 결과 <span style="color:#059669">■ 맞음</span> <span style="color:#DC2626;margin-left:6px">■ 틀림/빠짐</span></div><div style="line-height:2.2">'+res.wordDisplay+'</div><div style="font-size:11px;color:#888;margin-top:5px">'+res.matched+'/'+res.total+' 단어 정확</div></div>':'';
  var issH='';
  if(res.issues&&res.issues.length>0){
    var rows=res.issues.map(function(iss,i){
      return '<div style="display:flex;gap:9px;'+(i<res.issues.length-1?'padding-bottom:9px;margin-bottom:9px;border-bottom:1px solid #f3f4f6':'')+'"><div style="width:20px;height:20px;border-radius:50%;background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</div><div><div style="font-size:12px;color:#D97706;font-weight:700;margin-bottom:3px">"'+iss.word+'" → '+iss.said+'</div><div style="font-size:11px;color:#555;margin-bottom:3px">'+iss.issue+'</div><div style="font-size:11px;color:#2563EB">💡 '+iss.tip+'</div></div></div>';
    }).join('');
    issH='<div style="background:#fff;border-radius:13px;padding:13px;margin-bottom:10px;box-shadow:0 1px 8px rgba(0,0,0,.05)">'+rows+'</div>';
  } else {
    issH='<div style="background:#ECFDF5;border-radius:12px;padding:10px;font-size:12px;color:#059669;font-weight:600;text-align:center;margin-bottom:10px">모든 단어가 정확하게 들렸어요 🎉</div>';
  }
  var bar='<div style="background:#fff;border-radius:12px;padding:11px 13px;box-shadow:0 1px 8px rgba(0,0,0,.05)"><div style="display:flex;align-items:center;gap:9px"><span style="font-size:11px;color:#999">정확도</span><div style="flex:1;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden"><div style="height:100%;width:'+sc+'%;background:'+col+';border-radius:3px;transition:width .8s ease"></div></div><span style="font-weight:800;font-size:15px;color:'+col+';min-width:36px">'+sc+'%</span></div></div>';
  return wd+issH+bar;
}
