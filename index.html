// ── API ────────────────────────────────
async function claudeAPI(prompt, maxTok){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTok||1200,
      messages:[{role:"user",content:prompt}]})
  });
  const d=await r.json();
  const txt=(d.content||[]).map(b=>b.text||"").join("");
  const m=txt.replace(/```json|```/g,"").match(/[\[{][\s\S]*[\]}\n]/);
  if(!m) return null;
  try{return JSON.parse(m[0]);}catch{return null;}
}

// ── render helpers ─────────────────────
function sl(s){
  return s.split("·").map((p,i)=>{
    const stressed=p!==p.toLowerCase()&&/[A-Z]/.test(p);
    return `${i>0?'<span style="color:var(--color-text-tertiary);font-size:10px">·</span>':''}`+
      `<span style="color:${stressed?"orange":"var(--color-text-secondary)"};font-weight:${stressed?"500":"400"};font-size:${stressed?"14px":"12px"}">${p}</span>`;
  }).join("");
}

// ── gen ────────────────────────────────
async function genMore(){
  if(genBusy||!cat) return;
  genBusy=true;
  const existing=sents.slice(-8).map(s=>s.text).join("\n");
  const prompt=`영어 발음 코치. "${PRMT[cat.id]||cat.name}" 카테고리 연습 문장 8개.
중복 금지:\n${existing}
JSON 배열만(설명없이):
[{"text":"영어문장","kr":"한국어번역","w":[{"w":"단어","s":"SOW·nds","e":0}],"into":"fall","tips":["팁1","팁2"]}]
w.s: 구글식 발음표기 CAPS=강세음절 ·=음절구분 / w.e: 0일반 1주강조 2보조 / into:fall|rise|rise-fall / 5~12단어`;
  try{
    const arr=await claudeAPI(prompt,3000);
    if(Array.isArray(arr)&&arr.length>0){
      const ex=new Set(sents.map(s=>s.text));
      const fresh=arr.filter(s=>s.text&&!ex.has(s.text));
      sents.push(...fresh);
      if(view==="drill") render();
    }
  }catch(e){console.error("gen err",e);}
  genBusy=false;
}

// ── mic ────────────────────────────────
function errMsg(code){
  return {
    "not-allowed":"마이크 권한을 허용해 주세요 (주소창 자물쇠 아이콘)",
    "permission-denied":"마이크 권한을 허용해 주세요",
    "no-speech":"음성이 감지되지 않았습니다. 더 크게 말해 보세요.",
    "network":"네트워크 오류입니다.",
    "audio-capture":"마이크가 감지되지 않습니다.",
  }[code]||`오류: ${code}`;
}

function startRec(onFinal){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showErr("Chrome 또는 Edge 브라우저를 사용해 주세요.");return;}
  recog=new SR(); recog.lang="en-US"; recog.interimResults=true; recog.continuous=false;
  let last="";
  recog.onstart=()=>{isRec=true; render();};
  recog.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join("");
    last=t; liveText=t; render();
  };
  recog.onerror=e=>{isRec=false; showErr(errMsg(e.error)); render();};
  recog.onend=()=>{
    isRec=false; render();
    if(last.trim()) onFinal(last.trim());
  };
  try{recog.start();}catch(e){showErr("마이크를 시작할 수 없습니다.");}
}
function stopRec(){
  if(recog){try{recog.stop();}catch(_){}recog=null;}
  isRec=false; render();
}
function showErr(msg){
  document.getElementById("mic-err").innerHTML=msg;
  document.getElementById("mic-err").style.display="block";
}

let analResult=null, analLoading=false;
async function analyze(input, target){
  analLoading=true; analResult=null; render();
  const prompt=`한국인 영어 발음 분석가.
학습자 발화: "${input}"${target?`\n연습 문장: "${target}"`:""}

미국 원어민이 실제로 들었을 때 어떻게 들리는지만 써줘.
교정하거나 올바른 버전 보여주지 마. 오직 들리는 소리만.
한국인 발음 패턴: TH→D or T, R/L 혼동, 자음 사이 모음 삽입, 잘못된 강세, 모음 길이 오류.

예:
"I want to eat rice" → "I won't to eat lice"
"This is very difficult" → "Dis is belly diff-ee-cult"

JSON만:
{"native_hears":"들린 영어(어색한 발음 그대로)","issues":[{"word":"원래단어","heard":"들린것","why":"이유 한국어 1문장"}],"score":0}
issues 최대 4개. 좋으면 빈 배열.`;
  try{
    const r=await claudeAPI(prompt,700);
    analResult=r;
  }catch(e){analResult=null;}
  analLoading=false; render();
}

// ── navigation ─────────────────────────
async function nextS(){
  const next=idx+1;
  analResult=null; liveText=""; isRec=false;
  document.getElementById("mic-err").style.display="none";
  if(next<sents.length){idx=next; render(); if(sents.length-next<=3) genMore(); return;}
  // need to wait
  document.getElementById("nextbtn").textContent="불러오는 중...";
  document.getElementById("nextbtn").disabled=true;
  if(!genBusy) genMore();
  for(let i=0;i<24;i++){
    await new Promise(r=>setTimeout(r,500));
    if(next<sents.length){idx=next; render(); return;}
  }
  // fallback recycle
  sents.push(...(FB[cat.id]||FB.daily).map(s=>({...s})));
  idx=next; render();
}

          <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:3px 7px;font-family:var(--font-mono);line-height:1.3">${sl(word.s)}</div>
          <div style="font-size:11px;color:var(--color-text-tertiary)">${word.w}</div>
        </div>`).join("")}
      </div>

      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;display:flex;align-items:center;gap:8px">단어 강조<span style="flex:1;height:0.5px;background:var(--color-border-tertiary)"></span></div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">
        ${(s.w||[]).map(word=>{
          const col=word.e===1?"var(--color-text-warning)":word.e===2?"var(--color-text-secondary)":"var(--color-text-tertiary)";
          const bg=word.e===1?"var(--color-background-warning)":word.e===2?"var(--color-background-secondary)":"transparent";
          const fw=word.e===1?"500":"400";
          const fs=word.e===1?"15px":"13px";
          const tag=word.e===1?"main":word.e===2?"sub":"·";
          return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
            <span style="color:${col};background:${bg};font-weight:${fw};font-size:${fs};padding:3px 8px;border-radius:6px">${word.w}</span>
            <span style="font-size:9px;color:var(--color-text-tertiary);text-transform:uppercase">${tag}</span>
          </div>`;
        }).join("")}
      </div>

      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;display:flex;align-items:center;gap:8px">억양<span style="flex:1;height:0.5px;background:var(--color-border-tertiary)"></span></div>
      <div style="margin-bottom:20px"><span style="padding:4px 12px;border-radius:20px;font-size:13px;font-weight:500;background:${iBg[s.into]||iBg.fall};color:${iCol[s.into]||iCol.fall}">${iMap[s.into]||iMap.fall}</span></div>

      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;display:flex;align-items:center;gap:8px">발음 팁<span style="flex:1;height:0.5px;background:var(--color-border-tertiary)"></span></div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:18px">
        ${(s.tips||[]).map(t=>`<div style="font-size:12px;padding:5px 10px;background:var(--color-background-secondary);border-radius:6px;border-left:2px solid orange;color:var(--color-text-secondary);line-height:1.5">${t}</div>`).join("")}
      </div>
      <button class="pc-btn" onclick="speakIt('${s.text.replace(/'/g,"\\'").replace(/"/g,"&quot;")}')">▶ 원어민 발음 듣기</button>
    </div>

    <div style="flex:1;overflow-y:auto;max-height:520px;padding:22px 18px;display:flex;flex-direction:column;gap:10px">
      <div class="pc-card" style="text-align:center">
        <button onclick="${isRec?"stopRec()":"startPracticeRec()"}"
          style="width:64px;height:64px;border-radius:50%;border:1px solid ${isRec?"var(--color-border-danger)":"var(--color-border-secondary)"};background:${isRec?"var(--color-background-danger)":"var(--color-background-secondary)"};cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;${isRec?"animation:pcpulse 1.4s ease infinite":""}">
          ${isRec?"⏹":"🎙"}
        </button>
        <div style="font-size:13px;font-weight:500;margin-bottom:3px;color:${isRec?"var(--color-text-danger)":"var(--color-text-primary)"}">
          ${isRec?"🔴 녹음 중... 영어로 말하세요":"마이크 버튼을 누르고 말하세요"}
        </div>
        <div style="font-size:12px;color:var(--color-text-tertiary)">${isRec?"버튼을 다시 누르면 중지됩니다":"왼쪽 문장을 읽어보세요"}</div>
        ${liveText?`<div style="margin-top:10px;padding:7px 11px;background:var(--color-background-secondary);border-radius:7px;font-size:14px;font-weight:500;color:var(--color-text-info)">${liveText}</div>`:""}
        <div id="mic-err" style="display:none;font-size:12px;color:var(--color-text-danger);margin-top:7px;padding:7px 11px;background:var(--color-background-danger);border-radius:7px"></div>
      </div>
      <div id="anal-area" class="pcfu">${renderAnalysis()}</div>
      ${!analResult&&!analLoading&&!liveText?`<div style="text-align:center;color:var(--color-text-tertiary);padding:20px 0;font-size:13px"><div style="font-size:26px;margin-bottom:8px">👂</div>녹음하면 원어민 귀에 어떻게 들리는지<br>분석해 드립니다</div>`:""}
    </div>
  </div>

  <div style="padding:11px 18px;display:flex;gap:9px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)">
    <button class="pc-btn" onclick="if(idx>0){idx--;analResult=null;liveText='';isRec=false;render();}" ${idx===0?"disabled":""} style="flex:1;padding:10px;font-size:13px;font-weight:500;opacity:${idx===0?".35":"1"}">← 이전</button>
    <button id="nextbtn" onclick="nextS()" style="flex:1;padding:10px;font-size:13px;font-weight:500;background:orange;border:none;border-radius:8px;color:#000;cursor:pointer">다음 →</button>
  </div>
</div>`;
    return;
  }
}

function renderAnalysis(){
  if(analLoading) return `<div style="display:flex;align-items:center;gap:8px;color:var(--color-text-secondary);font-size:13px;padding:12px 0"><div class="pc-spin"></div>원어민 귀에 어떻게 들리는지 분석 중...</div>`;
  if(!analResult) return "";
  const sc=Math.max(0,Math.min(100,analResult.score||70));
  const col=sc>=80?"var(--color-text-success)":sc>=55?"orange":"var(--color-text-danger)";
  return `<div style="display:flex;flex-direction:column;gap:9px">
    <div class="pc-sm">
      <div class="pc-lbl">📡 원어민 귀에 이렇게 들림</div>
      <div style="font-family:var(--font-mono);font-size:15px;color:var(--color-text-info);line-height:1.6">${analResult.native_hears||analResult.heard||"—"}</div>
    </div>
    ${analResult.issues&&analResult.issues.length>0?`
    <div class="pc-sm" style="display:flex;flex-direction:column;gap:9px">
      <div class="pc-lbl">발음 문제 ${analResult.issues.length}개</div>
      ${analResult.issues.map((iss,i)=>`
      <div style="display:flex;gap:9px">
        <div style="width:20px;height:20px;border-radius:50%;background:var(--color-background-danger);color:var(--color-text-danger);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">${i+1}</div>
        <div>
          <div style="font-family:var(--font-mono);font-size:12px;color:orange;margin-bottom:3px">"${iss.word}" → "${iss.heard}"</div>
          <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.5">${iss.why}</div>
        </div>
      </div>`).join("")}
    </div>`:`<div style="font-size:14px;color:var(--color-text-success);padding:6px 0">원어민 귀에 자연스럽게 들립니다</div>`}
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:11px;color:var(--color-text-tertiary)">명확도</div>
      <div style="flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${sc}%;background:${col};border-radius:3px"></div>
      </div>
      <div style="font-family:var(--font-mono);font-size:15px;font-weight:500;color:${col}">${sc}%</div>
    </div>
  </div>`;
}

function startCheckerRec(){
  liveText=""; analResult=null;
  startRec(async t=>{ await analyze(t,""); });
}
function startPracticeRec(){
  liveText=""; analResult=null;
  const target=sents[idx]?.text||"";
  startRec(async t=>{ await analyze(t,target); });
}

function startDrill(id,name){
  cat={id,name}; sents=[...(FB[id]||FB.daily)]; idx=0;
  analResult=null; liveText=""; isRec=false;
  view="drill"; render();
  genMore();
}
function quickStart(id,name){
  view="cats"; render();
  setTimeout(()=>startDrill(id,name),10);
}
function speakIt(txt){
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  u.lang="en-US"; u.rate=0.82;
  speechSynthesis.speak(u);
}

render();
</script>
